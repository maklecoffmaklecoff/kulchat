<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Кул Чат:D — AI Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{
      --bg:#090909;--bg-raised:#111111;--bg-surface:#181818;--bg-hover:#1f1f1f;--bg-input:#0e0e0e;
      --border:#222222;--text:#f0ece4;--text-secondary:#a09889;--text-muted:#5c5650;
      --accent:#d4a853;--accent-soft:rgba(212,168,83,0.12);--accent-hover:#e8bc6a;
      --danger:#c45c5c;--danger-soft:rgba(196,92,92,0.12);--success:#5c9c6f;
      --radius:12px;--radius-lg:18px;--radius-full:100px;
      --font-display:'Cormorant Garamond',Georgia,serif;
      --font-body:'DM Sans',-apple-system,sans-serif;
      --font-mono:'JetBrains Mono',monospace;
      --ease:cubic-bezier(0.16,1,0.3,1);
    }
    html,body{height:100%;font-family:var(--font-body);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;overflow:hidden}
    .app{display:flex;height:100vh;height:100dvh}

    .sidebar{width:300px;background:var(--bg-raised);border-right:1px solid var(--border);display:flex;flex-direction:column;position:relative;z-index:50}
    .sidebar-brand{padding:24px 20px 16px;border-bottom:1px solid var(--border)}
    .brand-row{display:flex;align-items:center;gap:12px}
    .brand-mark{width:44px;height:44px;background:linear-gradient(145deg,var(--accent),#a67c2e);border-radius:13px;display:grid;place-items:center;font-family:var(--font-display);font-size:20px;font-weight:700;color:var(--bg);flex-shrink:0;position:relative;overflow:hidden}
    .brand-mark::after{content:'';position:absolute;inset:0;background:linear-gradient(145deg,transparent 40%,rgba(255,255,255,0.15))}
    .brand-name{font-family:var(--font-display);font-size:21px;font-weight:600;letter-spacing:-0.3px;line-height:1.1}
    .brand-tag{font-size:11px;color:var(--text-muted);letter-spacing:0.8px;text-transform:uppercase;margin-top:2px}
    .sidebar-body{flex:1;overflow-y:auto;padding:12px}
    .sidebar-section-label{font-size:10px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--text-muted);padding:8px 10px 6px}
    .new-chat-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:11px;background:transparent;border:1px dashed var(--border);border-radius:var(--radius);color:var(--text-secondary);font-family:var(--font-body);font-size:13px;font-weight:500;cursor:pointer;transition:all .2s var(--ease);margin-bottom:8px}
    .new-chat-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-soft)}
    .new-chat-btn svg{width:16px;height:16px}
    .chat-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius);cursor:pointer;transition:all .15s ease;font-size:13.5px;color:var(--text-secondary);position:relative;user-select:none}
    .chat-item:hover{background:var(--bg-surface);color:var(--text)}
    .chat-item.active{background:var(--accent-soft);color:var(--accent)}
    .chat-item svg{width:16px;height:16px;flex-shrink:0;opacity:.45}
    .chat-item.active svg{opacity:.9}
    .chat-item-title{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .chat-item-delete{position:absolute;right:6px;width:26px;height:26px;background:transparent;border:none;color:var(--text-muted);cursor:pointer;border-radius:6px;display:grid;place-items:center;opacity:0;transition:all .15s ease}
    .chat-item:hover .chat-item-delete{opacity:1}
    .chat-item-delete:hover{color:var(--danger);background:var(--danger-soft)}
    .chat-item-delete svg{width:14px;height:14px;opacity:1}
    .sidebar-footer{padding:12px;border-top:1px solid var(--border)}
    .settings-trigger{display:flex;align-items:center;gap:10px;width:100%;padding:10px 12px;background:transparent;border:none;border-radius:var(--radius);color:var(--text-secondary);font-family:var(--font-body);font-size:13px;cursor:pointer;transition:all .15s ease}
    .settings-trigger:hover{background:var(--bg-surface);color:var(--text)}
    .settings-trigger svg{width:18px;height:18px;opacity:.5}

    .main{flex:1;display:flex;flex-direction:column;min-width:0;position:relative}
    .main::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 20% 0%,rgba(212,168,83,.03) 0%,transparent 50%),radial-gradient(ellipse at 80% 100%,rgba(100,70,30,.025) 0%,transparent 50%);pointer-events:none}
    .chat-header{padding:16px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg-raised);position:relative;z-index:10}
    .chat-header-left{display:flex;align-items:center;gap:12px;min-width:0}
    .menu-btn{display:none;width:38px;height:38px;background:transparent;border:none;color:var(--text-secondary);cursor:pointer;border-radius:var(--radius);place-items:center;flex-shrink:0}
    .menu-btn:hover{background:var(--bg-surface)}
    .menu-btn svg{width:20px;height:20px}
    .chat-name{font-family:var(--font-display);font-size:17px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .model-pill{font-size:11px;padding:4px 10px;background:var(--accent-soft);color:var(--accent);border-radius:var(--radius-full);font-weight:500;flex-shrink:0}
    .header-actions{display:flex;gap:4px}
    .icon-btn{width:36px;height:36px;background:transparent;border:none;color:var(--text-muted);cursor:pointer;border-radius:var(--radius);display:grid;place-items:center;transition:all .15s ease}
    .icon-btn:hover{background:var(--bg-surface);color:var(--text)}
    .icon-btn svg{width:18px;height:18px}

    .messages{flex:1;overflow-y:auto;padding:24px 0;position:relative;z-index:1}
    .messages-inner{max-width:760px;margin:0 auto;padding:0 24px}
    .msg{display:flex;gap:14px;margin-bottom:28px;animation:msgIn .45s var(--ease) both}
    @keyframes msgIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    .msg-avatar{width:34px;height:34px;border-radius:10px;flex-shrink:0;display:grid;place-items:center;font-family:var(--font-display);font-weight:700;font-size:14px;margin-top:2px}
    .msg.user .msg-avatar{background:var(--bg-surface);color:var(--text-muted)}
    .msg.assistant .msg-avatar{background:linear-gradient(145deg,var(--accent),#a67c2e);color:var(--bg)}
    .msg-body{flex:1;min-width:0}
    .msg-name{font-size:13px;font-weight:600;margin-bottom:6px}
    .msg.user .msg-name{color:var(--text-muted)}
    .msg.assistant .msg-name{color:var(--text)}
    .msg-text{font-size:15px;line-height:1.72;color:var(--text-secondary)}
    .msg.assistant .msg-text{color:var(--text)}
    .msg-text p{margin-bottom:10px}
    .msg-text p:last-child{margin-bottom:0}
    .msg-text code{background:var(--bg-surface);padding:2px 7px;border-radius:5px;font-size:13px;font-family:var(--font-mono)}
    .msg-text pre{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin:12px 0;overflow-x:auto}
    .msg-text pre code{background:none;padding:0;font-size:13.5px;line-height:1.6}
    .msg-text a{color:var(--accent);text-decoration:none}
    .msg-text a:hover{text-decoration:underline}
    .msg-text ul,.msg-text ol{margin:8px 0;padding-left:22px}
    .msg-text li{margin-bottom:4px}
    .msg-text blockquote{border-left:3px solid var(--accent);padding-left:16px;margin:12px 0;color:var(--text-muted);font-style:italic}
    .msg-text strong{color:var(--text);font-weight:600}
    .msg-text h2,.msg-text h3,.msg-text h4{font-family:var(--font-display);margin:16px 0 8px;font-weight:600}

    .typing{display:flex;gap:5px;padding:6px 0}
    .typing span{width:7px;height:7px;background:var(--text-muted);border-radius:50%;animation:dotPulse 1.3s ease infinite}
    .typing span:nth-child(2){animation-delay:.13s}
    .typing span:nth-child(3){animation-delay:.26s}
    @keyframes dotPulse{0%,60%,100%{transform:translateY(0);opacity:.35}30%{transform:translateY(-5px);opacity:1}}

    .welcome{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center;position:relative;z-index:1}
    .welcome-icon{width:88px;height:88px;background:linear-gradient(145deg,var(--accent),#a67c2e);border-radius:24px;display:grid;place-items:center;font-family:var(--font-display);font-size:38px;font-weight:700;color:var(--bg);margin-bottom:28px;position:relative}
    .welcome-icon::before{content:'';position:absolute;inset:-6px;border-radius:28px;border:1px solid var(--accent);opacity:.2;animation:ringPulse 3s ease infinite}
    @keyframes ringPulse{0%,100%{transform:scale(1);opacity:.2}50%{transform:scale(1.08);opacity:.08}}
    .welcome h2{font-family:var(--font-display);font-size:36px;font-weight:600;margin-bottom:10px;letter-spacing:-0.5px}
    .welcome p{font-size:15px;color:var(--text-muted);max-width:380px;line-height:1.65;margin-bottom:32px}
    .chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:520px}
    .chip{padding:10px 18px;background:var(--bg-raised);border:1px solid var(--border);border-radius:var(--radius-full);color:var(--text-secondary);font-family:var(--font-body);font-size:13px;cursor:pointer;transition:all .2s var(--ease)}
    .chip:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-soft);transform:translateY(-2px)}

    .input-area{padding:14px 24px 20px;background:var(--bg-raised);border-top:1px solid var(--border);position:relative;z-index:10}
    .input-inner{max-width:760px;margin:0 auto}
    .input-row{display:flex;align-items:flex-end;gap:10px;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius-lg);padding:8px 8px 8px 18px;transition:border-color .2s ease,box-shadow .2s ease}
    .input-row:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
    .input-row textarea{flex:1;background:transparent;border:none;color:var(--text);font-family:var(--font-body);font-size:15px;line-height:1.5;resize:none;outline:none;min-height:24px;max-height:160px;padding:6px 0}
    .input-row textarea::placeholder{color:var(--text-muted)}
    .send-btn{width:40px;height:40px;background:var(--accent);border:none;border-radius:11px;color:var(--bg);cursor:pointer;display:grid;place-items:center;flex-shrink:0;transition:all .2s var(--ease)}
    .send-btn:hover:not(:disabled){background:var(--accent-hover);transform:scale(1.05)}
    .send-btn:disabled{opacity:.35;cursor:not-allowed}
    .send-btn svg{width:18px;height:18px}
    .input-hint{text-align:center;font-size:11px;color:var(--text-muted);margin-top:10px}
    .input-hint kbd{background:var(--bg-surface);padding:1px 5px;border-radius:4px;font-size:10px;font-family:var(--font-mono);border:1px solid var(--border)}

    .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(6px);display:grid;place-items:center;z-index:200;opacity:0;visibility:hidden;transition:all .25s ease}
    .modal-bg.open{opacity:1;visibility:visible}
    .modal{background:var(--bg-raised);border:1px solid var(--border);border-radius:var(--radius-lg);width:92%;max-width:500px;padding:28px;box-shadow:0 24px 80px rgba(0,0,0,.6);transform:scale(.94) translateY(12px);transition:transform .3s var(--ease);max-height:90vh;overflow-y:auto}
    .modal-bg.open .modal{transform:scale(1) translateY(0)}
    .modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
    .modal-head h3{font-family:var(--font-display);font-size:22px;font-weight:600}
    .modal-x{width:32px;height:32px;background:transparent;border:none;color:var(--text-muted);cursor:pointer;border-radius:8px;display:grid;place-items:center;transition:all .15s ease}
    .modal-x:hover{background:var(--bg-surface);color:var(--text)}
    .modal-x svg{width:18px;height:18px}
    .field{margin-bottom:18px}
    .field label{display:block;font-size:12.5px;font-weight:500;color:var(--text-secondary);margin-bottom:7px}
    .field input,.field select,.field textarea{width:100%;padding:11px 14px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:var(--font-body);font-size:14px;outline:none;transition:border-color .2s ease}
    .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent)}
    .field input::placeholder,.field textarea::placeholder{color:var(--text-muted)}
    .field-hint{font-size:11.5px;color:var(--text-muted);margin-top:5px;line-height:1.5}
    .modal-btns{display:flex;gap:10px;margin-top:24px}
    .btn{flex:1;padding:11px 18px;border:none;border-radius:var(--radius);font-family:var(--font-body);font-size:13.5px;font-weight:500;cursor:pointer;transition:all .2s ease}
    .btn-fill{background:var(--accent);color:var(--bg)}
    .btn-fill:hover{background:var(--accent-hover)}
    .btn-ghost{background:var(--bg-surface);color:var(--text-secondary)}
    .btn-ghost:hover{background:var(--bg-hover);color:var(--text)}
    .btn-danger{background:var(--danger-soft);color:var(--danger)}
    .btn-danger:hover{background:var(--danger);color:#fff}
    .status-row{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--bg);border-radius:var(--radius);margin-top:14px;font-size:12.5px;color:var(--text-secondary);word-break:break-all}
    .status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .status-dot.ok{background:var(--success)}
    .status-dot.err{background:var(--danger)}
    .status-dot.idle{background:var(--text-muted)}
    .empty-state{text-align:center;padding:20px 16px;color:var(--text-muted);font-size:12px}
    ::-webkit-scrollbar{width:5px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
    ::-webkit-scrollbar-thumb:hover{background:var(--text-muted)}

    @media(max-width:768px){
      .sidebar{position:fixed;left:0;top:0;bottom:0;width:82%;max-width:310px;transform:translateX(-100%);transition:transform .35s var(--ease);z-index:200;box-shadow:4px 0 40px rgba(0,0,0,.5)}
      .sidebar.mobile-open{transform:translateX(0)}
      .sidebar-scrim{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:199;opacity:0;visibility:hidden;transition:all .3s ease}
      .sidebar-scrim.active{opacity:1;visibility:visible}
      .menu-btn{display:grid}
      .messages-inner{padding:0 16px}
      .input-area{padding:10px 16px 16px}
      .chat-header{padding:14px 16px}
      .model-pill{display:none}
      .welcome{padding:32px 20px}
      .welcome h2{font-size:28px}
      .welcome-icon{width:72px;height:72px;font-size:30px;border-radius:20px}
      .msg{gap:10px;margin-bottom:22px}
      .msg-avatar{width:30px;height:30px;font-size:12px}
      .msg-text{font-size:14.5px}
      .input-hint{display:none}
    }
    @media(max-width:400px){
      .input-row{padding:6px 6px 6px 14px}
      .send-btn{width:36px;height:36px}
    }
  </style>
</head>
<body>
<div class="app">
  <div class="sidebar-scrim" id="scrim"></div>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand"><div class="brand-row"><div class="brand-mark">Hα</div><div><div class="brand-name">КУЛ-ЧАТ</div><div class="brand-tag">AI Assistant</div></div></div></div>
    <div class="sidebar-body">
      <button class="new-chat-btn" id="newChatBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Новый чат</button>
      <div class="sidebar-section-label">История</div>
      <div id="chatList"></div>
    </div>
    <div class="sidebar-footer">
      <button class="settings-trigger" id="settingsBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72l1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>Настройки API</button>
    </div>
  </aside>
  <main class="main">
    <div class="chat-header">
      <div class="chat-header-left">
        <button class="menu-btn" id="menuBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
        <span class="chat-name" id="chatTitle">Новый чат</span>
        <span class="model-pill" id="modelPill">KUL AI</span>
      </div>
      <div class="header-actions">
        <button class="icon-btn" id="clearBtn" title="Очистить"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg></button>
      </div>
    </div>
    <div class="messages" id="messagesArea"></div>
    <div class="input-area">
      <div class="input-inner">
        <div class="input-row">
          <textarea id="msgInput" rows="1" placeholder="Напишите сообщение..."></textarea>
          <button class="send-btn" id="sendBtn" disabled><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button>
        </div>
        <div class="input-hint"><kbd>Enter</kbd> отправить · <kbd>Shift+Enter</kbd> новая строка</div>
      </div>
    </div>
  </main>
</div>

<div class="modal-bg" id="settingsModal">
  <div class="modal">
    <div class="modal-head"><h3>Настройки API</h3><button class="modal-x" id="modalClose"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
    <div class="field">
      <label>API Key</label>
      <input type="password" id="apiKey" placeholder="sk-or-v1-...">
      <div class="field-hint">Ключ OpenRouter (хранится локально в браузере)</div>
    </div>
    <div class="field">
      <label>Системный промпт</label>
      <textarea id="systemPrompt" rows="3" placeholder="Ты — Hunter Alpha..."></textarea>
      <div class="field-hint">Инструкция для AI о его роли и поведении</div>
    </div>
    <div class="status-row"><span class="status-dot idle" id="statusDot"></span><span id="statusText">Не проверено</span></div>
    <div class="modal-btns">
      <button class="btn btn-danger" id="resetBtn">Сброс</button>
      <button class="btn btn-ghost" id="testApiBtn">Проверить</button>
      <button class="btn btn-fill" id="saveApiBtn">Сохранить</button>
    </div>
  </div>
</div>

<script>
const API_URL = "https://openrouter.ai/api/v1/chat/completions";
const MODEL = "openrouter/hunter-alpha";

const DEFAULTS = {
  apiKey: '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',
  systemPrompt: 'Ты — Hunter Alpha, умный AI-ассистент. Отвечай на языке пользователя. Будь полезным, точным и интересным.'
};

let state = { settings: { ...DEFAULTS }, chats: [], activeChatId: null };

function save() { try { localStorage.setItem('ha_chat', JSON.stringify(state)); } catch(e) {} }
function load() {
  try {
    const r = localStorage.getItem('ha_chat');
    if (r) {
      const p = JSON.parse(r);
      state = { ...state, ...p };
      if (!state.settings.apiKey) state.settings.apiKey = DEFAULTS.apiKey;
      if (!state.settings.systemPrompt) state.settings.systemPrompt = DEFAULTS.systemPrompt;
    } else {
      state.settings = { ...DEFAULTS };
    }
  } catch(e) { state.settings = { ...DEFAULTS }; }
}

const $ = id => document.getElementById(id);
const sidebar = $('sidebar'), scrim = $('scrim'), messagesArea = $('messagesArea');
const msgInput = $('msgInput'), sendBtn = $('sendBtn'), chatList = $('chatList');
const chatTitle = $('chatTitle'), settingsModal = $('settingsModal');

function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

function createChat() {
  const c = { id: genId(), title: 'Новый чат', messages: [], created: Date.now() };
  state.chunks = state.chats || [];
  state.chats.unshift(c);
  state.activeChatId = c.id;
  save(); renderSidebar(); renderChat(); closeMobile();
}

function deleteChat(id, e) {
  e.stopPropagation();
  state.chats = state.chats.filter(c => c.id !== id);
  if (state.activeChatId === id) state.activeChatId = state.chats.length ? state.chats[0].id : null;
  save(); renderSidebar(); renderChat();
}

function selectChat(id) { state.activeChatId = id; save(); renderSidebar(); renderChat(); closeMobile(); }
function getActiveChat() { return state.chats.find(c => c.id === state.activeChatId) || null; }

function clearActiveChat() {
  const c = getActiveChat();
  if (!c || !confirm('Очистить историю?')) return;
  c.messages = []; c.title = 'Новый чат';
  save(); renderSidebar(); renderChat();
}

function renderSidebar() {
  if (!state.chats.length) { chatList.innerHTML = '<div class="empty-state">Нет чатов</div>'; return; }
  chatList.innerHTML = state.chats.map(c =>
    `<div class="chat-item${c.id === state.activeChatId ? ' active' : ''}" data-id="${c.id}">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
      <span class="chat-item-title">${esc(c.title)}</span>
      <button class="chat-item-delete" data-del="${c.id}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>`
  ).join('');
  chatList.querySelectorAll('.chat-item').forEach(el => el.addEventListener('click', () => selectChat(el.dataset.id)));
  chatList.querySelectorAll('.chat-item-delete').forEach(btn => btn.addEventListener('click', e => deleteChat(btn.dataset.del, e)));
}

function renderChat() {
  const c = getActiveChat();
  if (!c) {
    chatTitle.textContent = 'KUL AI';
    messagesArea.innerHTML = renderWelcome(); bindChips(); return;
  }
  chatTitle.textContent = c.title;
  if (!c.messages.length) { messagesArea.innerHTML = renderWelcome(); bindChips(); return; }
  messagesArea.innerHTML = `<div class="messages-inner">${c.messages.map((m, i) => renderMsg(m, i)).join('')}</div>`;
  scrollToBottom();
}

function renderWelcome() {
  return `<div class="welcome">
    <div class="welcome-icon">Hα</div>
    <h2>KUL AI</h2>
    <p>Здравствуйте! Я ваш AI-ассистент. Задайте мне любой вопрос или выберите тему ниже.</p>
    <div class="chips" id="chips">
      <button class="chip" data-q="Расскажи о себе и своих возможностях">Возможности</button>
      <button class="chip" data-q="Объясни квантовые вычисления простыми словами">Квантовые вычисления</button>
      <button class="chip" data-q="Напиши короткий рассказ в жанре киберпанк">Киберпанк</button>
      <button class="chip" data-q="Какие книги ты посоветуешь?">Книги</button>
    </div>
  </div>`;
}

function renderMsg(m, idx) {
  const u = m.role === 'user';
  return `<div class="msg ${m.role}" style="animation-delay:${idx * .04}s">
    <div class="msg-avatar">${u ? 'Вы' : 'Hα'}</div>
    <div class="msg-body">
      <div class="msg-name">${u ? 'Вы' : 'KUL AI'}</div>
      <div class="msg-text">${m.role === 'assistant' ? md(m.content) : esc(m.content).replace(/\n/g, '<br>')}</div>
    </div>
  </div>`;
}

function renderTyping() {
  return `<div class="msg assistant" id="typingMsg">
    <div class="msg-avatar">Hα</div>
    <div class="msg-body">
      <div class="msg-name">Kul AI</div>
      <div class="typing"><span></span><span></span><span></span></div>
    </div>
  </div>`;
}

// ===== MARKDOWN =====
function esc(s) { return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
function md(text) {
  let h = esc(text);
  h = h.replace(/```(\w*)\n([\s\S]*?)```/g, (_, l, c) => `<pre><code>${c.trim()}</code></pre>`);
  h = h.replace(/`([^`]+)`/g, '<code>$1</code>');
  h = h.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  h = h.replace(/\*(.+?)\*/g, '<em>$1</em>');
  h = h.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  h = h.replace(/^### (.+)$/gm, '<h4>$1</h4>');
  h = h.replace(/^## (.+)$/gm, '<h3>$1</h3>');
  h = h.replace(/^# (.+)$/gm, '<h2>$1</h2>');
  h = h.replace(/^[\-\*] (.+)$/gm, '<li>$1</li>');
  h = h.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');
  h = h.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');
  h = h.split('\n\n').map(p => {
    p = p.trim();
    if (!p) return '';
    if (p.startsWith('<')) return p;
    return `<p>${p}</p>`;
  }).join('');
  h = h.replace(/<p>([\s\S]*?)<\/p>/g, (_, c) => `<p>${c.replace(/\n/g, '<br>')}</p>`);
  return h;
}

// ===== API — exactly matching the working format =====
async function sendMessage() {
  const text = msgInput.value.trim();
  if (!text) return;

  let chat = getActiveChat();
  if (!chat) { createChat(); chat = getActiveChat(); }

  if (!chat.messages.length) {
    chat.title = text.slice(0, 40) + (text.length > 40 ? '...' : '');
    renderSidebar(); chatTitle.textContent = chat.title;
  }

  chat.messages.push({ role: 'user', content: text });
  msgInput.value = ''; msgInput.style.height = 'auto'; sendBtn.disabled = true;
  save(); renderChat(); scrollToBottom();

  const inner = messagesArea.querySelector('.messages-inner');
  if (inner) { inner.insertAdjacentHTML('beforeend', renderTyping()); scrollToBottom(); }

  const { apiKey, systemPrompt } = state.settings;

  if (!apiKey) {
    removeTyping();
    chat.messages.push({ role: 'assistant', content: '⚠️ Настройте API ключ в настройках.' });
    save(); renderChat(); return;
  }

  try {
    const reply = await callAPI(chat.messages, systemPrompt);
    removeTyping();
    chat.messages.push({ role: 'assistant', content: reply });
  } catch (err) {
    removeTyping();
    chat.messages.push({
      role: 'assistant',
      content: `⚠️ **Ошибка**\n\n\`${err.message}\`\n\nПроверьте API ключ и попробуйте снова.`
    });
  }

  save(); renderChat();
}

function removeTyping() { const el = document.getElementById('typingMsg'); if (el) el.remove(); }

async function callAPI(messages, systemPrompt) {
  const { apiKey } = state.settings;

  // Build messages array exactly like the working example
  const apiMessages = [];

  // Add system as first user message if present
  if (systemPrompt) {
    apiMessages.push({ role: 'system', content: systemPrompt });
  }

  // Add conversation history (last 20 messages to avoid token limits)
  const history = messages.slice(-20);
  for (const m of history) {
    apiMessages.push({ role: m.role, content: m.content });
  }

  console.log('=== API CALL ===');
  console.log('URL:', API_URL);
  console.log('Model:', MODEL);
  console.log('Messages:', apiMessages.length);

  const response = await fetch(API_URL, {
    method: "POST",
    headers: {
      "Authorization": `Bearer ${apiKey}`,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      model: MODEL,
      messages: apiMessages
    })
  });

  const responseText = await response.text();
  console.log('Status:', response.status);
  console.log('Response:', responseText.slice(0, 500));

  if (!response.ok) {
    let errMsg = responseText;
    try {
      const d = JSON.parse(responseText);
      if (d.error) {
        errMsg = typeof d.error === 'string' ? d.error : (d.error.message || JSON.stringify(d.error));
      }
    } catch(e) {}
    throw new Error(`${response.status}: ${errMsg.slice(0, 200)}`);
  }

  const data = JSON.parse(responseText);

  if (data.choices?.[0]?.message?.content) {
    return data.choices[0].message.content;
  }

  throw new Error('Пустой ответ от API: ' + JSON.stringify(data).slice(0, 200));
}

// ===== UTILS =====
function scrollToBottom() { requestAnimationFrame(() => { messagesArea.scrollTop = messagesArea.scrollHeight; }); }
function bindChips() {
  document.querySelectorAll('.chip[data-q]').forEach(c => {
    c.addEventListener('click', () => { msgInput.value = c.dataset.q; sendBtn.disabled = false; msgInput.focus(); });
  });
}
function openMobile() { sidebar.classList.add('mobile-open'); scrim.classList.add('active'); }
function closeMobile() { sidebar.classList.remove('mobile-open'); scrim.classList.remove('active'); }

// ===== SETTINGS =====
function openSettings() {
  $('apiKey').value = state.settings.apiKey;
  $('systemPrompt').value = state.settings.systemPrompt;
  $('statusDot').className = 'status-dot idle';
  $('statusText').textContent = 'Не проверено';
  settingsModal.classList.add('open');
}
function closeSettings() { settingsModal.classList.remove('open'); }

function saveSettings() {
  state.settings.apiKey = $('apiKey').value.trim();
  state.settings.systemPrompt = $('systemPrompt').value.trim() || DEFAULTS.systemPrompt;
  save(); closeSettings();
}

async function testAPI() {
  const apiKey = $('apiKey').value.trim();
  if (!apiKey) {
    $('statusDot').className = 'status-dot err';
    $('statusText').textContent = 'Укажите API ключ';
    return;
  }

  $('statusDot').className = 'status-dot idle';
  $('statusText').textContent = 'Проверка...';

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: {
        "Authorization": `Bearer ${apiKey}`,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        model: MODEL,
        messages: [{ role: "user", content: "Say OK" }]
      })
    });

    const text = await res.text();
    console.log('Test:', res.status, text.slice(0, 300));

    if (res.ok) {
      $('statusDot').className = 'status-dot ok';
      $('statusText').textContent = '✓ Подключение успешно!';
    } else {
      let errMsg = text;
      try { const d = JSON.parse(text); if (d.error?.message) errMsg = d.error.message; } catch(e) {}
      $('statusDot').className = 'status-dot err';
      $('statusText').textContent = `${res.status}: ${errMsg.slice(0, 100)}`;
    }
  } catch (e) {
    $('statusDot').className = 'status-dot err';
    $('statusText').textContent = e.message;
  }
}

function resetSettings() {
  if (!confirm('Сбросить настройки?')) return;
  state.settings = { ...DEFAULTS };
  save(); openSettings();
}

// ===== EVENTS =====
$('newChatBtn').addEventListener('click', createChat);
$('clearBtn').addEventListener('click', clearActiveChat);
$('menuBtn').addEventListener('click', openMobile);
$('scrim').addEventListener('click', closeMobile);
$('settingsBtn').addEventListener('click', openSettings);
$('modalClose').addEventListener('click', closeSettings);
$('saveApiBtn').addEventListener('click', saveSettings);
$('testApiBtn').addEventListener('click', testAPI);
$('resetBtn').addEventListener('click', resetSettings);
settingsModal.addEventListener('click', e => { if (e.target === settingsModal) closeSettings(); });
sendBtn.addEventListener('click', sendMessage);
msgInput.addEventListener('input', () => {
  msgInput.style.height = 'auto';
  msgInput.style.height = Math.min(msgInput.scrollHeight, 160) + 'px';
  sendBtn.disabled = !msgInput.value.trim();
});
msgInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if (msgInput.value.trim()) sendMessage(); }
});

// ===== INIT =====
load();
renderSidebar();
renderChat();
setTimeout(() => msgInput.focus(), 300);
</script>
